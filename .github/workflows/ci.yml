name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 14

  flutter-build:
    name: Build Android (debug-signed, build-verification only)
    runs-on: ubuntu-latest
    needs: flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # No `android/key.properties` exists in this job — every build here is
      # debug-signed. That's fine for verifying the build doesn't break; it
      # is NOT a publishable artifact. See android/KEYSTORE.md for what's
      # needed to produce a real, store-signed app bundle.
      - name: Build APK (debug-signed)
        run: flutter build apk --release

      - name: Build App Bundle (debug-signed)
        run: flutter build appbundle --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-signed-builds
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 7

  functions:
    name: Cloud Functions lint + emulator tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      # ubuntu-latest ships a JDK, which the Firestore/Auth emulators need.
      # firebase-tools is installed on the fly rather than as a devDependency
      # so functions/package.json stays focused on runtime deps.
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run tests against the Firebase Emulator Suite
        env:
          # Optional — see README's "Testing" section. Without it, the three
          # App-Check-enforced function tests (anthropicProxy,
          # redeemReferralCode, deleteAccount) will 401.
          FIREBASE_APP_CHECK_TEST_APP_ID: ${{ secrets.FIREBASE_APP_CHECK_TEST_APP_ID }}
        run: firebase emulators:exec --project demo-ilnd-test "npm test"
